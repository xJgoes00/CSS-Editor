<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CSV Editor — Edit spreadsheets online</title>
    <meta name="description" content="Free online CSV editor. Open, edit, and save CSV files with a familiar spreadsheet interface.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left">
                <span class="logo">CSV Editor</span>
                <button id="btn-new" class="toolbar-btn" title="New sheet">
                    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M9.5 1.1l3.4 3.5.1.4v10c0 .6-.4 1-1 1H4c-.6 0-1-.4-1-1V2c0-.6.4-1 1-1h5.1l.4.1zM9 2H4v13h8V5.5L9 2z"/></svg>
                    New
                </button>
                <button id="btn-open" class="toolbar-btn" title="Open CSV file">
                    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M6 1H2c-.6 0-1 .4-1 1v12c0 .6.4 1 1 1h12c.6 0 1-.4 1-1V5l-5-4zm5.5 1L13 3.5V14H2V2h3v3h5.5V2zM6 2v2h4L6 2z"/></svg>
                    Open
                </button>
                <button id="btn-save" class="toolbar-btn" title="Save active sheet as CSV">
                    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M13.35 6h-2.85V1h-5v5H2.65L8 11.35 13.35 6zM2.65 13v2h10.7v-2H2.65z"/></svg>
                    Save
                </button>
                <button id="btn-save-all" class="toolbar-btn" title="Save all sheets as CSV">
                    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M13.35 6h-2.85V1h-5v5H2.65L8 11.35 13.35 6zM2.65 13v2h10.7v-2H2.65z"/></svg>
                    Save All
                </button>
            </div>
            <div class="toolbar-right">
                <button id="btn-undo" class="toolbar-btn icon-only" title="Undo (Ctrl+Z)">
                    <svg width="16" height="16" viewBox="0 0 16 16" style="transform:rotate(-90deg)"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 12.5a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/><path d="M10.5 8h-5l2.5-2.5z"/></svg>
                </button>
                <button id="btn-redo" class="toolbar-btn icon-only" title="Redo (Ctrl+Y)">
                    <svg width="16" height="16" viewBox="0 0 16 16" style="transform:rotate(-90deg)"><path d="M8 1a7 7 0 1 1 0 14A7 7 0 0 1 8 1zm0 12.5a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11z"/><path d="M5.5 8h5L8 10.5z"/></svg>
                </button>
                <span class="separator"></span>
                <button id="btn-add-row" class="toolbar-btn" title="Add row">
                    <svg width="14" height="14" viewBox="0 0 14 14"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2"/></svg>
                    Row
                </button>
                <button id="btn-add-col" class="toolbar-btn" title="Add column">
                    <svg width="14" height="14" viewBox="0 0 14 14"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2"/></svg>
                    Col
                </button>
                <span class="separator"></span>
                <input type="checkbox" id="dark-mode-toggle" hidden>
                <label for="dark-mode-toggle" class="toggle-switch" title="Toggle dark mode">
                    <span class="toggle-track">
                        <span class="toggle-thumb">
                            <svg class="icon-sun" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                            <svg class="icon-moon" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        </span>
                    </span>
                </label>
            </div>
        </div>

        <!-- Formula bar -->
        <div class="formula-bar">
            <span id="cell-ref" class="cell-ref">A1</span>
            <input id="formula-input" type="text" placeholder="Type a value..." spellcheck="false">
        </div>

        <!-- Spreadsheet grid -->
        <div class="grid-container" id="grid-container">
            <div class="grid" id="grid"></div>
        </div>

        <!-- Sheet tabs bar -->
        <div class="sheet-bar">
            <div class="sheet-tabs-scroll" id="sheet-tabs-scroll">
                <div class="sheet-tabs" id="sheet-tabs">
                    <!-- tabs rendered by JS -->
                </div>
            </div>
            <button class="sheet-add-btn" id="sheet-add-btn" title="Add new sheet">+</button>
            <div class="status-info">
                <span id="status-cells">0 cells</span>
                <span id="status-selection" class="status-selection"></span>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" accept=".csv,.tsv,.txt" hidden>
    <div id="toast" class="toast"></div>

    <!-- Support toast -->
    <div class="support-toast" id="support-toast">
        <button class="support-close" id="support-close">&times;</button>
        <p class="support-text">Enjoying this tool?<br>Buy me a coffee &#9749;</p>
        <img src="qr-support.png" alt="Support QR" class="support-qr" width="100" height="100">
        <a href="https://buymeacoffee.com/Jgoes00" target="_blank" rel="noopener" class="support-link">buymeacoffee.com/Jgoes00</a>
    </div>

    <script src="app.js"></script>
</body>
</html>
